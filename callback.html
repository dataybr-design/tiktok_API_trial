<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>TikTok OAuth Callback</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      line-height: 1.5;
    }
    code, pre {
      background: #f4f4f4;
      padding: 12px;
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 6px;
    }
    .warning {
      background: #fff3cd;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>TikTok OAuth Callback</h1>

  <div class="warning">
    Esta página solo muestra los parámetros devueltos por TikTok.
    No intercambia tokens y no debe contener ningún secret.
  </div>

  <h2>Parámetros recibidos</h2>
  <pre id="output">Cargando...</pre>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace("#", ""));

    const params = {};

    for (const [key, value] of queryParams.entries()) {
      params[key] = value;
    }

    for (const [key, value] of hashParams.entries()) {
      params[key] = value;
    }

    document.getElementById("output").textContent = JSON.stringify(params, null, 2);
  </script>
</body>
</html>
