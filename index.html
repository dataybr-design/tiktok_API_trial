<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Business OAuth Callback</title>
</head>
<body>
  <h1>TikTok Business OAuth Callback</h1>

  <p>Authorization code / auth_code:</p>
  <pre id="code"></pre>

  <p>State:</p>
  <pre id="state"></pre>

  <p>Full URL:</p>
  <pre id="full-url"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);

    const code =
      params.get("auth_code") ||
      params.get("code") ||
      params.get("error") ||
      "No code found";
    <!-- Commit dummy para refrescar GitHub Pages -->
    document.getElementById("code").textContent = code;
    document.getElementById("state").textContent = params.get("state") || "";
    document.getElementById("full-url").textContent = window.location.href;
  </script>
</body>
</html>
